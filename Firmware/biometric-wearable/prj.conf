# ============================================================================
#  File:    prj.conf
#  Purpose: Kconfig for the biometric chest-strap firmware (all boards).
#  Author:  Daan
#  Date:    2026-06-14
#
#  Description:
#    Enables the subsystems the firmware needs: BLE peripheral + GATT, the ANT
#    add-on, I2C + TMP117 sensor, SAADC, GPIO, the WS2812 led_strip driver, and
#    logging. Board-specific pin/peripheral wiring lives in the devicetree
#    overlays, not here. Each non-obvious line is commented.
# ============================================================================

# ---- Logging ----------------------------------------------------------------
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3            # 3 = INFO; raise to 4 for debug bring-up

# ---- C library / float printing ---------------------------------------------
CONFIG_CBPRINTF_FP_SUPPORT=y          # LOG_*("%f", ...) for temps/conductance
CONFIG_FPU=y                          # heat-flux maths uses float

# ---- GPIO / sensors subsystem ----------------------------------------------
CONFIG_GPIO=y
CONFIG_SENSOR=y                       # Zephyr sensor API (TMP117 via tmp116)
CONFIG_TMP116=y                       # in-tree driver; covers TMP116 AND TMP117

# ---- I2C (TMP117 bus) -------------------------------------------------------
CONFIG_I2C=y

# ---- ADC / SAADC (EDA-GSR) --------------------------------------------------
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y               # nRF SAADC backend

# ---- WS2812 status pixel ----------------------------------------------------
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP=y                 # WS2812 led_strip (SPI variant in overlay)
CONFIG_SPI=y                          # SPI transport for worldsemi,ws2812-spi

# ---- Bluetooth LE (secondary link) ------------------------------------------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y                # we advertise + accept one central
CONFIG_BT_DEVICE_NAME="BodyTempPoC"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_GATT_DYNAMIC_DB=n           # service is static (BT_GATT_SERVICE_DEFINE)

# ---- ANT (primary link) -----------------------------------------------------
# Provided by the NCS ANT add-on. Symbols below assume the add-on is in the
# west manifest (see west.yml / README). ant_profile.c is guarded by CONFIG_ANT
# so the app still builds for BLE-only bring-up if the add-on is absent.
CONFIG_ANT=y

# ---- Multiprotocol arbitration ----------------------------------------------
# BLE + ANT coexist through MPSL timeslot arbitration that NCS provides; we do
# not hand-roll timeslots. MPSL is pulled in by the protocol stacks above.
CONFIG_MPSL=y

# ---- Kernel / threads -------------------------------------------------------
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048   # button debounce work runs here
CONFIG_HEAP_MEM_POOL_SIZE=2048

# ---- Optional: USB CDC ACM serial console -----------------------------------
# Uncomment to route the log/console over USB-C (J1) instead of the DK VCOM.
# CONFIG_USB_DEVICE_STACK=y
# CONFIG_USB_CDC_ACM=y
# CONFIG_UART_LINE_CTRL=y
