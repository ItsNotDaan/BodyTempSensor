#    metadata still lives in bodytemp_wearable.yaml.)
# ============================================================================

board:
  name: bodytemp_wearable
  full_name: BodyTempSensor Chest-Strap Wearable
  vendor: itsnotdaan
  socs:
    - name: nrf54l15
