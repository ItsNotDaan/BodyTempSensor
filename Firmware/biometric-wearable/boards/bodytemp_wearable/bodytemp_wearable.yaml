identifier: bodytemp_wearable/nrf54l15/cpuapp
name: BodyTempSensor Wearable (nRF54L15 cpuapp)
type: mcu
arch: arm
toolchain:
  - gnuarmemb
  - zephyr
ram: 256
flash: 1524
supported:
